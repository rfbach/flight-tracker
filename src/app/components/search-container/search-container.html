<div class="tab-container">
  <header class="tab-intro">
    <p class="eyebrow">Flight Tracker</p>
    <h2>Get up to date flight statuses</h2>
    <p>Switch search modes to look up by flight number or by route.</p>
  </header>

  <div class="tab-headers" role="tablist" aria-label="Flight search modes">
    <button
      type="button"
      role="tab"
      id="tab-flight-number"
      [class.active]="currentTab === 'flightNumber'"
      [attr.aria-selected]="currentTab === 'flightNumber'"
      [attr.tabindex]="currentTab === 'flightNumber' ? '0' : '-1'"
      aria-controls="panel-flight-number"
      (click)="switchTab('flightNumber')"
    >
      Flight Number
    </button>
    <button
      type="button"
      role="tab"
      id="tab-route"
      [class.active]="currentTab === 'route'"
      [attr.aria-selected]="currentTab === 'route'"
      [attr.tabindex]="currentTab === 'route' ? '0' : '-1'"
      aria-controls="panel-route"
      (click)="switchTab('route')"
    >
      Route
    </button>
  </div>

  <div class="tab-panels">
    <section 
      role="tabpanel" 
      id="panel-flight-number" 
      aria-labelledby="tab-flight-number"
      [hidden]="currentTab !== 'flightNumber'"
    >
      <app-search-by-flight-number [airlines]="airlines"></app-search-by-flight-number>
    </section>

    <section 
      role="tabpanel" 
      id="panel-route" 
      aria-labelledby="tab-route"
      [hidden]="currentTab !== 'route'"
    >
      <app-search-by-route [airlines]="airlines"></app-search-by-route>
    </section>
  </div>
</div>
