<section class="search-panel">
	<form
		class="search-form"
		(submit)="$event.preventDefault(); searchByRoute(origin.value, destination.value, airline.value)"
	>
		<div class="field-grid">
			<label class="field-label" for="origin-input">
				Origin
				<input #origin id="origin-input" type="text" placeholder="Example: SEA" autocomplete="off" />
			</label>

			<label class="field-label" for="destination-input">
				Destination
				<input
					#destination
					id="destination-input"
					type="text"
					placeholder="Example: DEN"
					autocomplete="off"
				/>
			</label>

			<label class="field-label" for="airline-input">
				Airline
				<input #airline id="airline-input" type="text" placeholder="Example: JetBlue" autocomplete="off" />
			</label>

			<button class="search-button" type="submit">Search</button>
		</div>
	</form>
    @if (hasMoreResults()) {
        <div class="warning-banner">
            <div class="warning-icon">⚠️</div>
            <div class="warning-content">
                <strong>Too many results</strong>
                <p>Free API tier limit reached. Consider refining your search by airline.</p>
            </div>
        </div>
    }

	<app-results-card [searchResults]="searchResults()" [hasSearched]="hasSearched()" />
</section>
