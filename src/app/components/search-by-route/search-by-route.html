<section class="search-panel">
	<form
		class="search-form"
		(submit)="$event.preventDefault(); searchByRoute(origin.value, destination.value, airline.value)"
	>
		<div class="field-grid">
			<label class="field-label" for="origin-input">
				Origin (IATA)
				<input #origin id="origin-input" type="text" placeholder="Example: SEA" autocomplete="off" />
			</label>

			<label class="field-label" for="destination-input">
				Destination (IATA)
				<input
					#destination
					id="destination-input"
					type="text"
					placeholder="Example: DEN"
					autocomplete="off"
				/>
			</label>

			<label class="field-label" for="airline-input">
				Airline
				<select #airline id="airline-input">
					<option value="">All Airlines</option>
					@for (airline of airlines(); track airline.code) {
						<option [value]="airline.code">{{ airline.name }} ({{ airline.code }})</option>
					}
				</select>
			</label>

			<button class="search-button" type="submit">Search</button>
		</div>
	</form>
    @if (hasMoreResults()) {
        <div class="warning-banner">
            <div class="warning-icon">⚠️</div>
            <div class="warning-content">
                <strong>Too many results</strong>
                <p>Free API tier limit reached. Consider refining your search by airline.</p>
            </div>
        </div>
    }

	<app-results-list [searchResults]="searchResults()" [hasSearched]="hasSearched()" [isLoading]="isLoading()" [airlines]="airlines()" />
</section>
